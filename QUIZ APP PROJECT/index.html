<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Application</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row">
      <div class="card shadow p-3 quiz-card rounded-4">
        <h2 class="fw-bold fst-italic text-center text-primary">
          Quiz Application
        </h2>
        <div class="d-flex justify-content-between mt-3">
          <span id="qnsNumber" class="fs-5">Question 1/10</span>
          <span id="timer" class="text-danger fs-3">30</span>
        </div>
        <h3 id="qns" class="text-center">
          quiz Question will be appeared here
        </h3>
        <div id="options" class="row mt-3 g-3"></div>
        <button id="nextBtn" onclick="nextQns()" class="btn btn-outline-primary mt-3 mb-2">
          Next
        </button>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="./script.js"></script>
</body>

</html>
